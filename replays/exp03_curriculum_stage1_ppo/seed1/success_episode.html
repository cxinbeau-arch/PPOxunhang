<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NavAgent Replay - exp03_curriculum_stage1_ppo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #1f2937; }
    .layout { display: grid; grid-template-columns: minmax(320px, 560px) 1fr; gap: 24px; align-items: start; }
    canvas { border: 1px solid #cbd5e1; background: #ffffff; width: 100%; max-width: 560px; aspect-ratio: 1; }
    pre { background: #f8fafc; padding: 12px; overflow: auto; border: 1px solid #e2e8f0; }
    input[type=range] { width: 100%; }
    .metric { margin: 8px 0; }
  </style>
</head>
<body>
  <h1>NavAgent Replay - exp03_curriculum_stage1_ppo</h1>
  <div class="layout">
    <div>
      <canvas id="grid" width="560" height="560"></canvas>
      <input id="slider" type="range" min="0" max="0" value="0">
      <button id="play">Play</button>
      <button id="pause">Pause</button>
    </div>
    <div>
      <div class="metric" id="status"></div>
      <pre id="planner"></pre>
      <pre id="summary"></pre>
    </div>
  </div>
  <script>
    const replay = {"run_name": "exp03_curriculum_stage1_ppo", "policy": "ppo", "use_planner": false, "episode_index": 0, "summary": {"episode_index": 0, "success": true, "completed_targets": 1, "total_targets": 1, "returned_to_base": true, "episode_reward": 31.11, "episode_length": 6, "path_length": 6, "collision_count": 0, "repeated_cell_count": 2, "remaining_battery": 29.0, "done_reason": "success", "agent_final_position": [0, 0], "base_position": [0, 0], "shortest_possible_path_length": 6, "path_efficiency": 1.0, "normalized_reward": 1.037, "mean_planning_time_ms": 0.0}, "config": {"level": "randomized", "grid_size": [8, 8], "base": [0, 0], "start": [0, 0], "targets": [[10, 10], [2, 9], [9, 2]], "obstacles": [], "max_steps": 120, "max_battery": 120, "reward_mode": "dense", "randomized_each_episode": true}, "memory": [], "frames": [{"grid_size": [8, 8], "agent_position": [1, 1], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": false}], "obstacles": [], "battery": 35.0, "max_battery": 35.0, "step": 0, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 0, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [2, 2], "current_target": [2, 2], "action": null, "action_name": "start", "reward": 0.0, "cumulative_reward": 0.0, "action_probabilities": null, "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [1, 2], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": false}], "obstacles": [], "battery": 34.0, "max_battery": 35.0, "step": 1, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 0, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [2, 2], "current_target": [2, 2], "action": 1, "action_name": "down", "reward": 0.185, "cumulative_reward": 0.185, "action_probabilities": [0.001006537233479321, 0.5412330627441406, 0.0025542762596160173, 0.45089757442474365, 0.004308607429265976], "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [2, 2], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": true}], "obstacles": [], "battery": 33.0, "max_battery": 35.0, "step": 2, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 0, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [0, 0], "current_target": [0, 0], "action": 3, "action_name": "right", "reward": 10.185, "cumulative_reward": 10.370000000000001, "action_probabilities": [0.017018640413880348, 0.06641887128353119, 0.0016643103444948792, 0.9102252125740051, 0.0046729338355362415], "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [1, 2], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": true}], "obstacles": [], "battery": 32.0, "max_battery": 35.0, "step": 3, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 1, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [0, 0], "current_target": [0, 0], "action": 2, "action_name": "left", "reward": 0.185, "cumulative_reward": 10.555000000000001, "action_probabilities": [0.49256205558776855, 0.000247933465288952, 0.5023203492164612, 0.0009991175029426813, 0.003870472777634859], "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [1, 1], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": true}], "obstacles": [], "battery": 31.0, "max_battery": 35.0, "step": 4, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 2, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [0, 0], "current_target": [0, 0], "action": 0, "action_name": "up", "reward": 0.185, "cumulative_reward": 10.740000000000002, "action_probabilities": [0.9128090143203735, 0.00023365477682091296, 0.07765451073646545, 0.005613198969513178, 0.0036895659286528826], "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [1, 0], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": true}], "obstacles": [], "battery": 30.0, "max_battery": 35.0, "step": 5, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 2, "shortest_possible_path_length": 6, "done_reason": "running", "llm_subgoal": [0, 0], "current_target": [0, 0], "action": 0, "action_name": "up", "reward": 0.185, "cumulative_reward": 10.925000000000002, "action_probabilities": [0.4938561022281647, 0.0025470794644206762, 0.4818550944328308, 0.010732276365160942, 0.011009450070559978], "planner_output": null, "planning_time_ms": 0.0}, {"grid_size": [8, 8], "agent_position": [0, 0], "base_position": [0, 0], "targets": [{"position": [2, 2], "visited": true}], "obstacles": [], "battery": 29.0, "max_battery": 35.0, "step": 6, "max_steps": 120, "collision_count": 0, "revisit_count": 0, "repeated_cell_count": 2, "shortest_possible_path_length": 6, "done_reason": "success", "llm_subgoal": [0, 0], "current_target": [0, 0], "action": 2, "action_name": "left", "reward": 20.185, "cumulative_reward": 31.11, "action_probabilities": [0.05201173201203346, 0.017833787947893143, 0.9109459519386292, 0.007233072072267532, 0.011975465342402458], "planner_output": null, "planning_time_ms": 0.0}]};
    const frames = replay.frames || [];
    const canvas = document.getElementById("grid");
    const ctx = canvas.getContext("2d");
    const slider = document.getElementById("slider");
    const statusEl = document.getElementById("status");
    const plannerEl = document.getElementById("planner");
    const summaryEl = document.getElementById("summary");
    slider.max = Math.max(0, frames.length - 1);
    let timer = null;

    function draw(index) {
      const frame = frames[index];
      if (!frame) return;
      const [w, h] = frame.grid_size;
      const cell = Math.min(canvas.width / w, canvas.height / h);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#e2e8f0";
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          ctx.strokeRect(x * cell, y * cell, cell, cell);
        }
      }
      for (const [x, y] of frame.obstacles || []) {
        ctx.fillStyle = "#334155";
        ctx.fillRect(x * cell, y * cell, cell, cell);
      }
      const [bx, by] = frame.base_position;
      ctx.fillStyle = "#2563eb";
      ctx.fillRect(bx * cell + 4, by * cell + 4, cell - 8, cell - 8);
      for (const target of frame.targets || []) {
        const [x, y] = target.position;
        ctx.fillStyle = target.visited ? "#16a34a" : "#f97316";
        ctx.beginPath();
        ctx.arc(x * cell + cell / 2, y * cell + cell / 2, cell * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }
      const [sx, sy] = frame.llm_subgoal || frame.current_target || frame.base_position;
      ctx.strokeStyle = "#a855f7";
      ctx.lineWidth = 3;
      ctx.strokeRect(sx * cell + 8, sy * cell + 8, cell - 16, cell - 16);
      const [ax, ay] = frame.agent_position;
      ctx.fillStyle = "#dc2626";
      ctx.beginPath();
      ctx.arc(ax * cell + cell / 2, ay * cell + cell / 2, cell * 0.32, 0, Math.PI * 2);
      ctx.fill();
      statusEl.innerHTML = `Step ${frame.step}/${frame.max_steps}<br>Action: ${frame.action_name}<br>Reward: ${frame.reward.toFixed(3)} | Return: ${frame.cumulative_reward.toFixed(3)}<br>Battery: ${frame.battery.toFixed(1)}/${frame.max_battery}`;
      plannerEl.textContent = JSON.stringify(frame.planner_output || {}, null, 2);
      summaryEl.textContent = JSON.stringify(replay.summary || {}, null, 2);
      slider.value = index;
    }

    slider.addEventListener("input", () => draw(Number(slider.value)));
    document.getElementById("play").onclick = () => {
      if (timer) return;
      timer = setInterval(() => {
        let next = Number(slider.value) + 1;
        if (next >= frames.length) next = 0;
        draw(next);
      }, 300);
    };
    document.getElementById("pause").onclick = () => {
      clearInterval(timer);
      timer = null;
    };
    draw(0);
  </script>
</body>
</html>
