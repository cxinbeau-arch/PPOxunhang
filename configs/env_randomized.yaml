level: randomized
map:
  size: 12
  random_start: true
  random_targets: true
  num_targets_range: [2, 4]
  random_obstacles: true
  obstacle_density_range: [0.10, 0.22]
  ensure_solvable: true
  max_generation_retry: 100
battery:
  mode: shortest_path_budget
  budget_factor_range: [1.15, 1.45]
  min_battery: 35
episode:
  max_steps: 180
reset:
  seed: null
  randomized_each_episode: true
reward_mode: dense
target_selection: nearest
reward:
  task_bonus: 10.0
  return_bonus: 20.0
  collision_penalty: -1.2
  timeout_penalty: -5.0
  battery_out_penalty: -10.0
  step_penalty: -0.02
  target_distance_coef: 0.18
  base_distance_coef_low_battery: 0.12
  revisit_penalty: -0.02
  llm_subgoal_coef: 0.05
